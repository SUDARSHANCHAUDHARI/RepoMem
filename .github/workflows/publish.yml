name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:  # allow manual trigger after PyPI trusted publishing is configured

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for trusted publishing

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(python3 -c "
          import re
          content = open('pyproject.toml').read()
          m = re.search(r'^version\s*=\s*\"(.+?)\"', content, re.MULTILINE)
          print(m.group(1))
          ")
          INIT_VERSION=$(python3 -c "
          import re
          content = open('repomem/__init__.py').read()
          m = re.search(r'__version__\s*=\s*\"(.+?)\"', content)
          print(m.group(1))
          ")
          echo "Tag: $TAG | pyproject.toml: $TOML_VERSION | __init__.py: $INIT_VERSION"
          if [ "$TAG" != "$TOML_VERSION" ]; then
            echo "ERROR: tag ($TAG) does not match pyproject.toml version ($TOML_VERSION)"
            exit 1
          fi
          if [ "$TAG" != "$INIT_VERSION" ]; then
            echo "ERROR: tag ($TAG) does not match __init__.py version ($INIT_VERSION)"
            exit 1
          fi
          echo "Version check passed."

      - name: Run tests before publishing
        run: |
          pip install pytest
          python -m pytest tests/ -v --tb=short

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
